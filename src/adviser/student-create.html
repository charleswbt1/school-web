<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">
        <div id="header-container"></div>
        <section class="info-section">
            <h1>Registro de Estudiante</h1>
            <form id="studentForm">
                <input type="text" id="nick_name" placeholder="Nombre de usuario" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <input type="text" id="first_name" placeholder="Nombre" required>
                <input type="text" id="last_name" placeholder="Apellido paterno" required>
                <input type="text" id="second_last_name" placeholder="Apellido materno" required>
                <input type="text" id="curp" placeholder="CURP" required>
                <input type="tel" id="phone" placeholder="Teléfono" required>
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <select id="courseId" required>
                    <option value=""> Selecciona un curso </option>
                </select>

                <button type="submit">
                    Registrar
                </button>
            </form>
        </section>
    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="../adviser/student-create.js"></script>

</body>

</html>
