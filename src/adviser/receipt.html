<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
    <link rel="stylesheet" href="receipt.css">


</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">

            <h2>Recibo</h2>

            <form class="info-form" id="studentForm">

                <select id="studentId" required></select>

                <button type="submit">
                    Crear Recibo
                </button>

            </form>
            <div id="receiptContainer" class="receipt">

                <!-- CABECERA -->
                <div class="receipt-header">

                    <img id="logo" class="logo">

                    <div class="header-right">
                        <h1>RECIBO DE PAGO</h1>

                        <div class="receipt-number">
                            <span>No.</span>
                            <strong id="receiptNumber"></strong>
                        </div>

                    </div>

                </div>

                <!-- FECHA Y TOTAL -->

                <div class="receipt-row">

                    <div>
                        <label>Fecha</label>
                        <h2 id="date"></h2>
                    </div>

                    <div>
                        <label>Total</label>
                        <h2 id="total"></h2>
                    </div>

                </div>

                <!-- ALUMNO -->

                <div class="receipt-box">

                    <label>Alumno</label>

                    <p id="customer"></p>

                </div>

                <!-- INFORMACIÓN -->

                <div class="receipt-grid">

                    <div>
                        <label>CURP</label>
                        <p id="document"></p>
                    </div>

                    <div>
                        <label>Matrícula</label>
                        <p id="code"></p>
                    </div>

                    <div>
                        <label>Programa</label>
                        <p id="program"></p>
                    </div>

                    <div>
                        <label>Concepto</label>
                        <p id="concept"></p>
                    </div>

                </div>

                <!-- TABLA -->

                <table class="payment-table">

                    <thead>

                        <tr>

                            <th>Concepto</th>

                            <th>Importe</th>

                        </tr>

                    </thead>

                    <tbody id="paymentTable"></tbody>

                </table>

                <!-- ESTADO -->

                <div class="receipt-footer">

                    <div id="status"></div>

                </div>

            </div>
        </section>


    </div>
    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>


    <script src="../components/app.js"></script>
    <script src="receipt.js"></script>

</body>
<div id="imageModal" class="modal-image">
    <img id="modalImage">
</div>

</html>
