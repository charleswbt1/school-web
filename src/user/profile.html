<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
    <link rel="stylesheet" href="profile.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Mi Perfil</h2>
            </div>

            <input type="file" id="invoiceImage" accept="image/*" hidden>
            <img class="profile-image" id="previewImage"
                src="https://storage.googleapis.com/school-source/web/perfil.jpg" alt="Perfil">

            <form class="info-form" id="userForm">
                <input type="text" id="first_name" placeholder="Nombre">
                <input type="text" id="last_name" placeholder="Apellido">
                <input type="text" id="second_last_name" placeholder="Segundo Apellido">
                <input type="text" id="curp" placeholder="CURP">
                <input type="text" id="email" placeholder="Correo Electronico">
                <input type="text" id="phone" placeholder="Telefono">
                <button type="submit">
                    Actualizar perfil
                </button>
            </form>
            
            <button type="submit" id="changePassword">
                Cambiar contraseña
            </button>

        </section>
    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="profile.js"></script>

</body>

</html>
