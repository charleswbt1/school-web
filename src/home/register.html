<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">



<h1>Registro de Estudiante</h1>

        <form id="studentForm">

            <div class="form-group">
                <label for="nick_name">Nombre de usuario</label>
                <input
                    type="text"
                    id="nick_name"
                    name="nick_name"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required>
            </div>

            <div class="form-group">
                <label for="first_name">Nombre</label>
                <input
                    type="text"
                    id="first_name"
                    name="first_name"
                    required>
            </div>

            <div class="form-group">
                <label for="last_name">Apellido paterno</label>
                <input
                    type="text"
                    id="last_name"
                    name="last_name"
                    required>
            </div>

            <div class="form-group">
                <label for="second_last_name">Apellido materno</label>
                <input
                    type="text"
                    id="second_last_name"
                    name="second_last_name"
                    required>
            </div>

            <div class="form-group">
                <label for="phone">Teléfono</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required>
            </div>

            <button type="submit">
                Registrar
            </button>

        </form>





        </section>

    </div>
    
    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>
    
    <script src="../components/app.js"></script>
    <script src="../home/register.js"></script>

</body>

</html>
