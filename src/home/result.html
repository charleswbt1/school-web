<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación Exitosa</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            width: 420px;
            max-width: 90%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,.1);
            text-align: center;
        }

        .icon {
            width: 90px;
            height: 90px;
            margin: auto;
            border-radius: 50%;
            background: #c6d431;
            color: white;
            font-size: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            margin-top: 25px;
            color: #28a745;
            font-size: 30px;
        }

        p {
            margin: 20px 0;
            color: #555;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 28px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: .2s;
        }

        .button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="icon">
            !
        </div>

        <h1>¡Ops, Operación incompleta!</h1>

        <p>
             La información fallo al procesar.
        </p>

        <a href="/" class="button">
            Volver al inicio
        </a>

    </div>

</body>

</html>
