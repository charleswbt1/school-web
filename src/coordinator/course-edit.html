<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Curso</h2>
            </div>
            <form class="info-form" id="courseForm">
                <input type="text" id="name" placeholder="Nombre">
                <input type="text" id="description" placeholder="Descripción">
                <input type="text" id="call_link" placeholder="Link de clase en vivo">
                <input type="text" id="class_link" placeholder="Link de clases grabadas">
                <button type="submit">
                    Actualizar Curso
                </button>
            </form>
        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="course-edit.js"></script>

</body>

</html>
