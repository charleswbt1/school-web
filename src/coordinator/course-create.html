<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Crear Curso</h2>
            </div>
            <form class="info-form" id="courseForm">
                <input type="text" id="name" placeholder="Nombre" required>
                <input type="text" id="description" placeholder="Descripción" required>
                <input type="text" id="cost" placeholder="Costo" required>
                <input type="text" id="costInscription" placeholder="Costo Inscripción" required>
                <input type="text" id="offerCostInscription" placeholder="Oferta Inscripción" required>
                <input type="text" id="costQuota" placeholder="Costo Cuota" required>
                <input type="text" id="offerCostQuota" placeholder="Oferta Cuota" required>
                <input type="text" id="costReinscription" placeholder="Costo Reinscripción" required>
                <input type="text" id="offerCostReinscription" placeholder="Oferta Reinscripción" required>
                <input type="text" id="costTitle" placeholder="Costo Título" required>
                <input type="text" id="offerCostTitle" placeholder="Oferta Título" required>
                <input type="date" id="dateInit" placeholder="Fecha Inicio" required>
                <input type="date" id="dateEnd" placeholder="Fecha Fin" required>
                <input type="text" id="rvoe" placeholder="RVOE" required>
                <select id="squadId" required>
                    <option value=""> Selecciona una escuela </option>
                </select>
                <select id="contentId" required>
                    <option value=""> Selecciona un contenido </option>
                </select>
                <select id="adviserId" required>
                    <option value=""> Selecciona un asesor </option>
                </select>
                <select id="teacherId" required>
                    <option value=""> Selecciona un docente </option>
                </select>

                <button type="submit">
                    Crear Curso
                </button>
            </form>
        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="course-create.js"></script>

</body>

</html>
