<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Crear Curso</h2>
            </div>
            <p class="required-note">
                <span class="required">*</span> Campos obligatorios
            </p>
            <form class="info-form" id="courseForm">
                <label>Nombre<span class="required">*</span></label>
                <input type="text" id="name" placeholder="Nombre" required>

                <label>Descripción<span class="required">*</span></label>
                <input type="text" id="description" placeholder="Descripción" required>

                <label>Costo Inscripción<span class="required">*</span></label>
                <input type="text" id="offerCostInscription" placeholder="Costo Inscripción" required>

                <label>Número de cuotas<span class="required">*</span></label>
                <input type="text" id="numberQuota" placeholder="Número de cuotas" required>

                <label>Costo Cuota<span class="required">*</span></label>
                <input type="text" id="offerCostQuota" placeholder="Costo Cuota" required>

                <label>Costo Reinscripción<span class="required">*</span></label>
                <input type="text" id="offerCostReinscription" placeholder="Costo Reinscripción" required>

                <label>Costo Título<span class="required">*</span></label>
                <input type="text" id="offerCostTitle" placeholder="Costo Título" required>

                <label>Costo Título adicional</label>
                <input type="text" id="offerCostTitleTwo" placeholder="Costo Título adicional">

                <label>Fecha Inicio de clase<span class="required">*</span></label>
                <input type="date" id="dateInit" placeholder="Fecha Inicio" required>

                <label>Fecha Fin de clase<span class="required">*</span></label>
                <input type="date" id="dateEnd" placeholder="Fecha Fin" required>

                <label>RVOE<span class="required">*</span></label>
                <input type="text" id="rvoe" placeholder="RVOE" required>

                <label>Grado<span class="required">*</span></label>
                <select id="type" required>
                    <option value=""> Selecciona Grado</option>
                    <option value="Licenciatura">Licenciatura</option>
                    <option value="Especialidad">Especialidad</option>
                    <option value="Especialidad Maestría">Especialidad Maestría</option>
                    <option value="Bachillerato">Bachillerato</option>
                </select>

                <label>Escuela<span class="required">*</span></label>
                <select id="squadId" required></select>

                <label>Contenido<span class="required">*</span></label>
                <select id="contentId" required></select>

                <label>Asesor<span class="required">*</span></label>
                <select id="adviserId" required></select>

                <label>Docente</label>
                <select id="teacherId"></select>

                <button type="submit">
                    Crear Curso
                </button>
            </form>
            <br>
        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="course-create.js"></script>

</body>

</html>
