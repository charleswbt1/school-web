<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">

            <h2>Documento</h2>

            <form class="info-form" id="documentForm">

                <input type="file" id="invoiceImage" accept="image/*,.pdf" required hidden>
                <label for="invoiceImage" class="file-btn">Seleccionar Archivo</label>

                <div class="view-image-container" id="frame-image" hidden> 
                    <img id="previewImage" class="view-image" src="imagen.jpg">
                </div> 
                
                <select id="documentType" required></select>
                <select id="studentId" required></select>

                <button type="submit">
                    Subir Documento
                </button>

            </form>

        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="document.js"></script>

</body>

</html>
