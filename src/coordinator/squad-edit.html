<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Editar Escuela</h2>
            </div>
            <form class="info-form" id="squadForm">
                <input type="text" id="name" placeholder="Nombre">
                <input type="text" id="description" placeholder="Descripción">
                <input type="text" id="cct" placeholder="CCT">


                <div class="image-container">

                    <div class="image-box">
                        <h4>Logo Actual</h4>
                        <div id="currentLogoContainer"></div>
                    </div>

                    <div class="image-box">
                        <h4>Nuevo Logo</h4>
                        <img id="newLogoPreview" src="" alt="Vista previa" style="display:none;">
                    </div>

                </div>

                <input type="file" id="squadImage" accept="image/*" hidden>
                <label for="squadImage" class="file-btn">Nueva Imagen</label>



                <button type="submit">
                    Actualizar Escuela
                </button>
            </form>
        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="squad-edit.js"></script>

</body>

</html>
