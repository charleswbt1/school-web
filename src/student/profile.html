<!DOCTYPE html>
<html lang="es">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/x-icon" href="../components/favicon.ico" />
    <link rel="stylesheet" href="../components/styles.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main-container">

        <div id="header-container"></div>

        <section class="info-section">
            <div class="section-header">
                <h2>Mi Perfil</h2>
            </div>
            <form class="info-form" id="squadForm">
                <input type="text" id="name" placeholder="Nombre">
                <input type="text" id="curp" placeholder="CURP">
                <input type="text" id="e-mail" placeholder="Correo Electronico">
                <input type="text" id="phone" placeholder="Telefono" >
                <button type="submit">
                Cambiar contraseña
                </button>
            </form>
        </section>

    </div>

    <!-- MODAL LOGIN -->
    <div id="modal-container"></div>

    <script src="../components/app.js"></script>
    <script src="profile.js"></script>

</body>

</html>
