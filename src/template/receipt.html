<div id="receiptContainer" class="receipt">
    <div class="receipt-header">
        <img id="logo" class="logo" src="../components/iucHeader.png">
        <div class="header-right">
            <h1>RECIBO DE PAGO</h1>
            <div class="receipt-number">
                <span>No.</span>
                <strong id="receiptNumber"></strong>
            </div>
        </div>
    </div>
    <div class="receipt-row">
        <div>
            <label>Fecha</label>
            <h2 id="date"></h2>
        </div>
        <div>
            <label>Total</label>
            <h2 id="total"></h2>
        </div>
    </div>
    <div class="receipt-box">
        <label>Alumno</label>
        <p id="customer"></p>
    </div>
    <div class="receipt-grid">
        <div>
            <label>CURP</label>
            <p id="document"></p>
        </div>
        <div>
            <label>Matrícula</label>
            <p id="code"></p>
        </div>
        <div>
            <label>Programa</label>
            <p id="program"></p>
        </div>
        <div>
            <label>Concepto</label>
            <p id="concept"></p>
        </div>
    </div>
    <table class="payment-table">
        <thead>
            <tr>
                <th>Concepto</th>
                <th>Importe</th>
            </tr>
        </thead>
        <tbody id="paymentTable"></tbody>
    </table>
    <div class="receipt-footer">
        <div id="status">PAGADO</div>
    </div>
</div>
<div class="button-container">
    <button id="downloadReceipt" onclick="downloadReceipt()">
        📄 Descargar Recibo
    </button>
</div>
